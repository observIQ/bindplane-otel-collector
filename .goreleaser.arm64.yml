version: 2

project_name: observiq-otel-collector

before:
  hooks:
    - make release-prep CURR_VERSION={{ .Version }}
    # Pre-build the linux/arm64 binary via ocb-driven `make`.
    - GOOS=linux GOARCH=arm64 make build-binaries OUTDIR="tmp"

after:
  hooks:
    - cmd: rm -rf tmp

# `builder: prebuilt` — Make owns the build (`AGENT_LDFLAGS`,
# `-tags $(AGENT_BUILD_TAGS)`, i.e. `bindplane embed_library`).
builds:
  - id: collector
    builder: prebuilt
    binary: observiq-otel-collector
    goos:
      - linux
    goarch:
      - arm64
    prebuilt:
      path: tmp/collector_{{ .Os }}_{{ .Arch }}{{ .Ext }}

dockers:
  - id: ubuntu-arm64
    goos: linux
    goarch: arm64
    retry:
      attempts: 10
      delay: 30s
      max_delay: 1m
    ids:
      - collector
    image_templates:
      - "observiq/bindplane-agent-arm64:{{ .Version }}"
      - "observiq/bindplane-agent-arm64:latest"
    dockerfile: ./docker/Dockerfile.ubuntu
    use: buildx
    build_flag_templates:
      - "--label=created={{.Date}}"
      - "--label=title={{.ProjectName}}"
      - "--label=revision={{.FullCommit}}"
      - "--label=version={{.Version}}"
      - "--platform=linux/arm64"
    extra_files:
      - release_deps/VERSION.txt
      - release_deps/plugins
      - release_deps/config.yaml
      - config/logging.stdout.yaml
      - LICENSE
      - release_deps/opentelemetry-java-contrib-jmx-metrics.jar

changelog:
  disable: true