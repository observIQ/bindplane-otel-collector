# This example showcases file_log + json parser's ability to parse abitrary json.
receivers:
  file_log:
    include:
    # app represents a custom application using json logging
    - /var/log/app/log.json
    start_at: end
    resource:
      log_type: app
    operators:
      - type: json_parser

exporters: 
  googlecloud:

service:
  pipelines:
    logs:
      receivers:
      - file_log
      exporters:
      - googlecloud
